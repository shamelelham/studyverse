<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to bottom right, #6fa8e8, #7bb2f0);
}

/* Card */
.card{
    width:430px;
    background:#f4f4f4;
    border-radius:18px;
    padding:50px 40px;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
    text-align:center;
}

/* Title */
.card h2{
    color:#1f4db8;
    font-size:42px;
    font-weight:400;
    margin-bottom:30px;
}

/* Input Fields */
.input-box{
    width:100%;
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    padding:16px 18px;
    border:1px solid #cfcfcf;
    border-radius:12px;
    outline:none;
    font-size:17px;
    background:white;
}

.input-box input:focus{
    border-color:#1f4db8;
}

/* Button */
.reset-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#7d1423;
    color:white;
    font-size:22px;
    font-weight:500;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

.reset-btn:hover{
    background:#5f0f1a;
}

/* Links */
.links{
    margin-top:25px;
}

.links a{
    text-decoration:none;
    color:black;
    font-size:17px;
    transition:0.3s;
}

.links a:hover{
    color:#1f4db8;
}

</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>Reset Password</h2>

    <div class="input-box">
      <input
        id="resetEmail"
        type="email"
        placeholder="Enter your email">
    </div>

    <div class="input-box">
      <input
        id="newPassword"
        type="password"
        placeholder="New Password">
    </div>

    <button class="reset-btn" onclick="resetPassword()">
      Update Password
    </button>

    <div class="links">
      <p>
        <a href="login.html">
          Back to Login
        </a>
      </p>
    </div>
	
  </div>
</div>

<script>
function resetPassword() {

  let email = document.getElementById("resetEmail").value.trim();
  let newPassword = document.getElementById("newPassword").value.trim();

  // 🔴 1. Check empty fields
  if (email === "" || newPassword === "") {
    alert("Please fill in all fields!");
    return;
  }

  // 🔴 2. Check if user exists
  let user = JSON.parse(localStorage.getItem(email));

  if (!user) {
    alert("User not found!");
    return;
  }

  // 🔴 3. Update password
  user.password = newPassword;
  localStorage.setItem(email, JSON.stringify(user));

  alert("Password updated successfully!");

  window.location.href = "login.html";
  
}
</script>

</body>
</html>
